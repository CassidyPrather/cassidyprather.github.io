{{ define "main" }}
<main class="license-main">
  <section class="index-window">
    <div class="window-topline">
      <h2>{{ .Title }}</h2>
      <a class="status-light" href="{{ site.Home.RelPermalink }}">← Index</a>
    </div>

    <p class="guestbook-intro">
      BE MY GUEST
    </p>

    <div class="guestbook-frame-wrap">
      <iframe
        class="guestbook-frame"
        src="https://wirenook.atabook.org/"
        title="wirenook guestbook on atabook.org"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </section>
</main>
{{ end }}
