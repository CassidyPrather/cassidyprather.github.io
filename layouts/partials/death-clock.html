{{/* A memento mori widget, inspired by inqfactory's Death Clock. The dates
     and the actuarial hand-waving live at the bottom of assets/script.js;
     the LTS/Deprecated status copy lives in the data attributes below.
     Preview the deprecated state with ?dies=2020-01-01. */}}
<section class="death-clock" aria-label="Death clock — estimated time remaining" data-death-clock>
	<div class="death-clock-topline">
		<h3 class="death-clock-title">TIME</h3>
		<span class="status-light death-clock-status">
			<span class="blink-dot" aria-hidden="true"></span>
			<span data-death-status data-status-alive="LTS" data-status-overtime="Deprecated">LTS</span>
		</span>
	</div>
	<p class="death-clock-readout" role="timer" aria-live="off" aria-label="Estimated time remaining: years, days, hours, minutes, seconds">
		<span class="death-cell"><span class="death-num" data-death-years>—</span></span>
		<span class="death-cell"><span class="death-num" data-death-days>—</span></span>
		<span class="death-cell"><span class="death-num" data-death-hours>—</span></span>
		<span class="death-cell"><span class="death-num" data-death-minutes>—</span></span>
		<span class="death-cell"><span class="death-num" data-death-seconds>—</span></span>
	</p>
	<div class="death-clock-bar" aria-hidden="true">
		<span class="death-clock-fill" data-death-fill></span>
	</div>
	<noscript>
		<p class="death-clock-note">you are going to die. (the details require javascript.)</p>
	</noscript>
</section>
