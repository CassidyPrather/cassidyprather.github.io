baseURL = "https://cassidyprather.github.io/"
languageCode = "en"
title = "wirenook"
enableRobotsTXT = true

# Skip the unused taxonomies (tags/categories) to keep the published site to
# just the pages we author. RSS is off by default too ([outputs] below); the
# blog section opts back in via its front matter.
disableKinds = ["taxonomy", "term"]

# Publish future-dated posts immediately — a timestamp a few hours ahead
# should never silently drop a post from a deploy.
buildFuture = true

[outputs]
  home = ["html"]
  section = ["html"]

# CI passes --baseURL from the Pages configuration step, so the value above
# is only a fallback for local builds.

[params]
  description = "Cassidy Prather's Website"

[markup.goldmark.renderer]
  unsafe = true
